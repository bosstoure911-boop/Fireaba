<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>AfriEarn – Admin Panel</title>
<link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;500;600;700;800&family=Space+Mono:wght@400;700&display=swap" rel="stylesheet">

<!-- Firebase -->
<script type="module">
  import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-app.js";
  import { getFirestore, collection, query, orderBy, limit, onSnapshot } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-firestore.js";

  // ✅ CONFIGURATION FIREBASE AFRIEARN INTÉGRÉE
  const firebaseConfig = {
    apiKey: "AIzaSyBNc2ao4rcdrmgsk4vBA2-UPm1XUGhkjwI",
    authDomain: "afriearn-d8032.firebaseapp.com",
    projectId: "afriearn-d8032",
    storageBucket: "afriearn-d8032.firebasestorage.app",
    messagingSenderId: "720837721766",
    appId: "1:720837721766:web:8d739a3e5b8830861fbe67"
  };

  try {
    const app = initializeApp(firebaseConfig);
    const db = getFirestore(app);

    // Surveillance des connexions
    const loginsQ = query(collection(db, 'logins'), orderBy('timestamp', 'desc'), limit(20));
    onSnapshot(loginsQ, (snap) => {
      const logins = [];
      snap.forEach(d => logins.push({id: d.id, ...d.data()}));
      window.renderLogins(logins);
    });

    // Surveillance des membres
    const usersQ = query(collection(db, 'users'), orderBy('joinedAt', 'desc'));
    onSnapshot(usersQ, (snap) => {
      const users = [];
      snap.forEach(d => users.push({id: d.id, ...d.data()}));
      window.renderUsers(users);
    });

    // Surveillance des retraits
    const withdrawQ = query(collection(db, 'withdrawals'), orderBy('timestamp', 'desc'));
    onSnapshot(withdrawQ, (snap) => {
      const ws = [];
      snap.forEach(d => ws.push({id: d.id, ...d.data()}));
      window.renderWithdrawals(ws);
    });

  } catch(e) {
    console.error("Erreur Admin Firebase:", e);
  }
</script>

<style>
  :root {
    --bg: #0f1117;
    --surface: #1a1d27;
    --surface2: #22263a;
    --accent: #e85d26;
    --gold: #f4a61e;
    --text: #eef0f8;
    --muted: #7a80a0;
    --border: #2a2f42;
    --green: #3ddc84;
    --red: #f87171;
    --radius: 14px;
  }

  * { margin: 0; padding: 0; box-sizing: border-box; }
  body { font-family: 'Plus Jakarta Sans', sans-serif; background: var(--bg); color: var(--text); padding-bottom: 40px; }

  .topbar { background: var(--surface); border-bottom: 1px solid var(--border); padding: 16px 20px; display: flex; align-items: center; justify-content: space-between; position: sticky; top: 0; z-index: 10; }
  .logo { display: flex; align-items: center; gap: 8px; }
  .logo-icon { width: 28px; height: 28px; background: var(--accent); border-radius: 7px; display: flex; align-items: center; justify-content: center; }
  .logo-text { font-size: 15px; font-weight: 800; }
  .admin-badge { background: var(--accent); color: #fff; font-size: 10px; font-weight: 700; padding: 3px 8px; border-radius: 20px; margin-left: 5px; }

  .live-dot { display: inline-block; width: 8px; height: 8px; background: var(--green); border-radius: 50%; animation: pulse 1.5s infinite; margin-right: 5px; }
  @keyframes pulse { 0%,100%{opacity:1} 50%{opacity:0.3} }

  .content { padding: 16px; max-width: 600px; margin: 0 auto; }

  .stats-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; margin-bottom: 20px; }
  .stat-box { background: var(--surface); border: 1px solid var(--border); border-radius: var(--radius); padding: 15px; }
  .stat-box-label { font-size: 10px; color: var(--muted); font-weight: 700; text-transform: uppercase; margin-bottom: 5px; }
  .stat-box-val { font-size: 22px; font-weight: 800; font-family: 'Space Mono', monospace; color: var(--gold); }

  .section { background: var(--surface); border: 1px solid var(--border); border-radius: var(--radius); margin-bottom: 20px; overflow: hidden; }
  .section-header { padding: 12px 16px; border-bottom: 1px solid var(--border); font-size: 13px; font-weight: 700; display: flex; justify-content: space-between; background: rgba(255,255,255,0.02); }

  .item { display: flex; align-items: center; gap: 12px; padding: 12px 16px; border-bottom: 1px solid var(--border); }
  .avatar { width: 32px; height: 32px; border-radius: 50%; background: var(--surface2); display: flex; align-items: center; justify-content: center; font-size: 12px; font-weight: 800; color: var(--gold); }
  
  .info { flex: 1; min-width: 0; }
  .info-main { font-size: 13px; font-weight: 600; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
  .info-sub { font-size: 11px; color: var(--muted); }

  .val-side { text-align: right; }
  .val-main { font-size: 13px; font-weight: 800; font-family: 'Space Mono', monospace; color: var(--gold); }
  
  .badge { font-size: 9px; font-weight: 700; padding: 2px 6px; border-radius: 4px; text-transform: uppercase; }
  .badge-green { background: rgba(61,220,132,0.15); color: var(--green); }
  .badge-blue { background: rgba(91,156,246,0.15); color: #5b9cf6; }

  .empty { padding: 30px; text-align: center; color: var(--muted); font-size: 12px; }
</style>
</head>
<body>

<div class="topbar">
  <div class="logo">
    <div class="logo-icon">🌍</div>
    <div class="logo-text">AfriEarn <span class="admin-badge">ADMIN</span></div>
  </div>
  <div style="font-size:11px; color:var(--muted);"><span class="live-dot"></span> LIVE</div>
</div>

<div class="content">
  <div class="stats-grid">
    <div class="stat-box">
      <div class="stat-box-label">Membres</div>
      <div class="stat-box-val" id="total-users">0</div>
    </div>
    <div class="stat-box">
      <div class="stat-box-label">Retraits Attente</div>
      <div class="stat-box-val" id="pending-withdrawals" style="color:var(--red)">0</div>
    </div>
  </div>

  <div class="section">
    <div class="section-header">🔴 ACTIVITÉ RÉCENTE</div>
    <div id="logins-list"><div class="empty">Chargement...</div></div>
  </div>

  <div class="section">
    <div class="section-header">👥 LISTE DES MEMBRES</div>
    <div id="users-list"><div class="empty">Chargement...</div></div>
  </div>

  <div class="section">
    <div class="section-header">💳 DEMANDES DE RETRAIT</div>
    <div id="withdrawals-list"><div class="empty">Aucune demande</div></div>
  </div>
</div>

<script>
  function timeAgo(ts) {
    if (!ts) return 'maintenant';
    const date = ts.toDate ? ts.toDate() : new Date(ts);
    const diff = Math.floor((Date.now() - date.getTime()) / 1000);
    if (diff < 60) return diff + 's';
    if (diff < 3600) return Math.floor(diff/60) + 'm';
    return Math.floor(diff/3600) + 'h';
  }

  window.renderLogins = function(logins) {
    let html = '';
    logins.forEach(l => {
      const typeClass = l.action === 'register' ? 'badge-green' : 'badge-blue';
      html += `<div class="item">
        <div class="avatar">${(l.email||'?')[0].toUpperCase()}</div>
        <div class="info">
          <div class="info-main">${l.email}</div>
          <div class="info-sub">Il y a ${timeAgo(l.timestamp)}</div>
        </div>
        <div class="badge ${typeClass}">${l.action === 'register' ? 'Nouveau' : 'Login'}</div>
      </div>`;
    });
    document.getElementById('logins-list').innerHTML = html || '<div class="empty">Rien à signaler</div>';
  };

  window.renderUsers = function(users) {
    document.getElementById('total-users').textContent = users.length;
    let html = '';
    users.forEach(u => {
      html += `<div class="item">
        <div class="avatar">${(u.name||'?')[0].toUpperCase()}</div>
        <div class="info">
          <div class="info-main">${u.name || 'Inconnu'}</div>
          <div class="info-sub">📱 ${u.phone || 'Pas de tel'}</div>
        </div>
        <div class="val-side">
          <div class="val-main">${(u.balance||0).toLocaleString()} F</div>
        </div>
      </div>`;
    });
    document.getElementById('users-list').innerHTML = html;
  };

  window.renderWithdrawals = function(ws) {
    const pending = ws.filter(w => w.status === 'pending').length;
    document.getElementById('pending-withdrawals').textContent = pending;
    let html = '';
    ws.forEach(w => {
      html += `<div class="item">
        <div class="info">
          <div class="info-main">${w.network}</div>
          <div class="info-sub">${w.phone} • ${timeAgo(w.timestamp)}</div>
        </div>
        <div class="val-side">
          <div class="val-main" style="color:var(--red)">-${w.amount} F</div>
          <div class="info-sub">${w.status === 'pending' ? '⏳ ATTENTE' : '✅ PAYÉ'}</div>
        </div>
      </div>`;
    });
    document.getElementById('withdrawals-list').innerHTML = html || '<div class="empty">Aucun retrait</div>';
  };
</script>
</body>
</html>
