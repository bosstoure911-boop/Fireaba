<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>AfriEarn – Inscription</title>
<link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;500;600;700;800&family=Space+Mono:wght@400;700&display=swap" rel="stylesheet">

<script type="module">
  import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-app.js";
  import { getAuth, createUserWithEmailAndPassword, signInWithEmailAndPassword, onAuthStateChanged } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-auth.js";
  import { getFirestore, doc, setDoc, serverTimestamp } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-firestore.js";

  const firebaseConfig = {
    apiKey: "AIzaSyBNc2ao4rcdrmgsk4vBA2-UPm1XUGhkjwI",
    authDomain: "afriearn-d8032.firebaseapp.com",
    projectId: "afriearn-d8032",
    storageBucket: "afriearn-d8032.firebasestorage.app",
    messagingSenderId: "720837721766",
    appId: "1:720837721766:web:8d739a3e5b8830861fbe67"
  };

  const app = initializeApp(firebaseConfig);
  const auth = getAuth(app);
  const db = getFirestore(app);

  window._auth = auth;
  window._db = db;
  window._createUser = createUserWithEmailAndPassword;
  window._signIn = signInWithEmailAndPassword;
  window._setDoc = setDoc;
  window._doc = doc;
  window._serverTimestamp = serverTimestamp;

  // ✅ REDIRECTION PROPRE (évite boucle + 404)
  onAuthStateChanged(auth, (user) => {
    if (user) {
      window.location.replace('/afriearn-dashboard.html');
    }
  });
</script>

<style>
/* (TON CSS INCHANGÉ) */
:root {
  --bg: #f5f0e8;
  --surface: #ffffff;
  --accent: #e85d26;
  --accent2: #2d6a4f;
  --gold: #f4a61e;
  --text: #1a1a2e;
  --muted: #6b7280;
  --border: #e5e0d5;
  --radius: 18px;
}
*{margin:0;padding:0;box-sizing:border-box;}
body{font-family:'Plus Jakarta Sans',sans-serif;background:var(--bg);min-height:100vh;display:flex;align-items:center;justify-content:center;}
.container{max-width:480px;width:100%;padding:20px;}
.card{background:#fff;padding:30px;border-radius:18px;}
.btn-primary{width:100%;padding:15px;background:#e85d26;color:#fff;border:none;border-radius:12px;font-weight:700;cursor:pointer;}
.form-input{width:100%;padding:12px;margin-bottom:10px;border-radius:10px;border:1px solid #ccc;}
.alert{padding:10px;border-radius:10px;margin-bottom:10px;display:none;}
.alert.error{background:#fee2e2;color:#b91c1c;display:block;}
.alert.success{background:#dcfce7;color:#166534;display:block;}
</style>
</head>

<body>
<div class="container">
  <div class="card">

    <div class="alert" id="alert-box"></div>

    <h2>Créer un compte</h2>

    <input class="form-input" type="text" id="reg-name" placeholder="Nom complet">
    <input class="form-input" type="email" id="reg-email" placeholder="Email">
    <input class="form-input" type="tel" id="reg-phone" placeholder="Téléphone">
    <input class="form-input" type="password" id="reg-password" placeholder="Mot de passe">

    <button class="btn-primary" onclick="doRegister()">S'inscrire</button>

    <hr style="margin:20px 0">

    <h3>Connexion</h3>
    <input class="form-input" type="email" id="login-email" placeholder="Email">
    <input class="form-input" type="password" id="login-password" placeholder="Mot de passe">

    <button class="btn-primary" onclick="doLogin()">Se connecter</button>

  </div>
</div>

<script>
function showAlert(msg, type) {
  const box = document.getElementById('alert-box');
  box.textContent = msg;
  box.className = 'alert ' + type;
}

async function doRegister() {
  const name = document.getElementById('reg-name').value.trim();
  const email = document.getElementById('reg-email').value.trim();
  const phone = document.getElementById('reg-phone').value.trim();
  const password = document.getElementById('reg-password').value;

  if (!name || !email || !phone || !password) {
    showAlert('⚠️ Remplis tous les champs', 'error');
    return;
  }

  try {
    const cred = await window._createUser(window._auth, email, password);

    await window._setDoc(window._doc(window._db, 'users', cred.user.uid), {
      name,
      email,
      phone,
      balance: 500,
      joinedAt: window._serverTimestamp()
    });

    showAlert('✅ Compte créé ! Redirection...', 'success');

    // ✅ PAS de href → replace (évite bug 404 + historique)
    setTimeout(() => {
      window.location.replace('/afriearn-dashboard.html');
    }, 1000);

  } catch(e) {
    showAlert('❌ ' + e.message, 'error');
  }
}

async function doLogin() {
  const email = document.getElementById('login-email').value.trim();
  const password = document.getElementById('login-password').value;

  try {
    await window._signIn(window._auth, email, password);

    showAlert('✅ Connexion réussie', 'success');

    setTimeout(() => {
      window.location.replace('/afriearn-dashboard.html');
    }, 800);

  } catch(e) {
    showAlert('❌ ' + e.message, 'error');
  }
}
</script>

</body>
</html>
